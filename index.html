<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Original Gacha Maker</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="app">

    <!--==========================
        Header
    ===========================-->

    <header class="header">

        <h1>Original Gacha Maker</h1>

    </header>


    <!--==========================
        Tabs
    ===========================-->

    <nav class="tab-bar">

        <button
            class="tab active"
            data-page="home">

            ホーム

        </button>

        <button
            class="tab"
            data-page="gacha">

            ガチャ

        </button>

        <button
            class="tab"
            data-page="collection">

            図鑑

        </button>

        <button
            class="tab"
            data-page="editor">

            編集

        </button>

        <button
            class="tab"
            data-page="settings">

            設定

        </button>

    </nav>



    <main>

        <!--==========================
            Home
        ===========================-->

        <section
            id="home"
            class="page active">

            <div class="panel hero">

                <h2>Original Gacha Maker</h2>

                <p>

                    オリジナルキャラクターで遊べる
                    ガチャメーカー

                </p>

            </div>


            <div class="panel">

                <h3>開催中のガチャ</h3>

                <div id="homeBanner"
                     class="banner">

                    ガチャバナー

                </div>


                <div class="button-group">

                    <button
                        id="homeSingleButton"
                        class="primary-button">

                        1連ガチャ

                    </button>

                    <button
                        id="homeTenButton"
                        class="primary-button">

                        10連ガチャ

                    </button>

                </div>

            </div>

        </section>
                <!--==========================
            Gacha
        ===========================-->

        <section
            id="gacha"
            class="page">

            <div class="panel">

                <h2>ガチャ</h2>

                <div
                    id="gachaGrid"
                    class="gacha-area">

                    <div class="gacha-slot"><img></div>
                    <div class="gacha-slot"><img></div>
                    <div class="gacha-slot"><img></div>
                    <div class="gacha-slot"><img></div>
                    <div class="gacha-slot"><img></div>

                    <div class="gacha-slot"><img></div>
                    <div class="gacha-slot"><img></div>
                    <div class="gacha-slot"><img></div>
                    <div class="gacha-slot"><img></div>
                    <div class="gacha-slot"><img></div>

                </div>

                <div class="button-group">

                    <button
                        id="singleGachaButton"
                        class="primary-button">

                        1連ガチャ

                    </button>

                    <button
                        id="tenGachaButton"
                        class="primary-button">

                        10連ガチャ

                    </button>

                </div>

            </div>

        </section>



        <!--==========================
            Collection
        ===========================-->

        <section
            id="collection"
            class="page">

            <div class="panel">

                <h2>図鑑</h2>

                <div id="collectionGrid">

                </div>

            </div>

        </section>



        <!--==========================
            Editor
        ===========================-->

        <section
            id="editor"
            class="page">

            <!-- ガチャ -->

            <div class="panel">

                <h2>ガチャ</h2>

                <label class="label">

                    ガチャ名

                </label>

                <input
                    id="seriesName"
                    class="text-input"
                    type="text"
                    placeholder="例：ゆるどうぶつ">

                <label class="label">

                    バナー画像

                </label>

                <input
                    id="seriesBanner"
                    type="file"
                    accept="image/*">

                <button
                    id="saveSeries"
                    class="primary-button full">

                    ガチャを追加

                </button>

            </div>



            <!-- キャラクター -->

            <div class="panel">

                <h2>キャラクター</h2>

                <label class="label">

                    所属ガチャ

                </label>

                <select
                    id="characterGacha"
                    class="text-input">

                </select>

                <label class="label">

                    名前

                </label>

                <input
                    id="characterName"
                    class="text-input"
                    type="text">

                <label class="label">

                    レアリティ

                </label>

                <select
                    id="characterRarity"
                    class="text-input">

                    <option value="1">★</option>
                    <option value="2">★★</option>
                    <option value="3">★★★</option>
                    <option value="4">★★★★</option>
                    <option value="5">★★★★★</option>

                </select>

                <label class="label">

                    キャラクター画像

                </label>

                <input
                    id="characterImage"
                    type="file"
                    accept="image/*">

                <img
                    id="imagePreview"
                    class="preview-image">

                <label class="label">

                    アイコン画像

                </label>

                <input
                    id="characterIcon"
                    type="file"
                    accept="image/*">

                <img
                    id="iconPreview"
                    class="preview-image">

                <label class="label">

                    ガチャ演出セリフ

                </label>

                <input
                    id="characterQuote"
                    class="text-input"
                    type="text">

                <label class="label">

                    説明

                </label>

                <textarea
                    id="characterDescription"
                    class="text-area"
                    rows="5"></textarea>

                <button
                    id="saveCharacter"
                    class="primary-button full">

                    キャラクターを保存

                </button>

                <hr>

                <h3>登録済みキャラクター</h3>

                <div id="characterList"
                     class="character-list">

                </div>

            </div>

        </section>
        <!--==========================
            Settings
        ===========================-->

        <section
            id="settings"
            class="page">

            <div class="panel">

                <h2>設定</h2>

                <button
                    id="exportButton"
                    class="primary-button full">

                    データを書き出す

                </button>

                <button
                    id="importButton"
                    class="primary-button full">

                    データを読み込む

                </button>

                <input
                    id="importFile"
                    type="file"
                    accept=".json"
                    hidden>

                <button
                    id="resetButton"
                    class="primary-button full">

                    全データ削除

                </button>

            </div>

        </section>

    </main>

</div>


<!--==========================
    ガチャ結果
===========================-->

<div
    id="resultModal"
    class="result-modal hidden">

    <div class="result-card">

        <img
            id="resultFrame"
            class="result-frame">

        <img
            id="resultImage"
            class="result-image">

        <div
            id="resultStars"
            class="result-stars">

        </div>

        <h2 id="resultName">

        </h2>

        <p id="resultQuote">

        </p>

        <button
            id="closeResultButton"
            class="primary-button">

            OK

        </button>

    </div>

</div>


<script type="module" src="script.js"></script>

</body>
</html>
