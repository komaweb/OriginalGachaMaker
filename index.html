<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Original Gacha Maker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <!--==============================
        Header
    ==============================-->

    <header class="header">

        <h1>Original Gacha Maker</h1>

    </header>


    <!--==============================
        Tab
    ==============================-->

    <nav class="tab-bar">

        <button class="tab-button active"
                data-page="home">

            ホーム

        </button>

        <button class="tab-button"
                data-page="gacha">

            ガチャ

        </button>

        <button class="tab-button"
                data-page="collection">

            図鑑

        </button>

        <button class="tab-button"
                data-page="editor">

            編集

        </button>

        <button class="tab-button"
                data-page="settings">

            設定

        </button>

    </nav>



    <!--==============================
        Main
    ==============================-->

    <main>

        <!--==========================
            Home
        ===========================-->

        <section id="home"
                 class="page active">

            <div class="panel hero">

                <h2>Original Gacha Maker</h2>

                <p>
                    オリジナルキャラクターで遊べる
                    ガチャメーカー
                </p>

            </div>


            <div class="panel">

                <h3>開催中のガチャ</h3>

                <div class="banner">

                    ガチャバナー

                </div>

                <div class="button-group">

                    <button class="primary-button">

                        1連ガチャ

                    </button>

                    <button class="gacha-button">

    <img
        src="assets/ui/button-cat.png"
        class="button-frame"
        alt="">

    <span>

        10連ガチャ

    </span>

</button>
                </div>

            </div>

        </section>



        <!--==========================
            Gacha
        ===========================-->

        <section id="gacha"
                 class="page">

            <div class="panel">

                <h2>ガチャ</h2>

                <div class="banner">

                    ガチャ演出エリア

                </div>

                <div class="button-group">

                    <button class="primary-button">

                        1連

                    </button>

                    <button class="primary-button">

                        10連

                    </button>

                </div>

            </div>

        </section>



        <!--==========================
            Collection
        ===========================-->

        <section id="collection"
                 class="page">

            <div class="panel">

                <h2>図鑑</h2>

                <p>

                    キャラクター一覧

                </p>

            </div>

        </section>



     <!--==========================
    Editor
===========================-->

<section id="editor"
         class="page">

    <!-- ガチャシリーズ -->

    <div class="panel">

        <h2>ガチャシリーズ</h2>

        <label class="label">

            シリーズ名

        </label>

        <input
            id="seriesName"
            class="text-input"
            type="text"
            placeholder="例：ゆるどうぶつ">

        <label class="label">

            バナー画像

        </label>

        <input
            id="seriesBanner"
            type="file"
            accept="image/*">

        <button
            id="saveSeries"
            class="primary-button full">

            シリーズを保存

        </button>

    </div>



    <!-- キャラクター -->

    <div class="panel">

        <h2>キャラクター</h2>

        <label class="label">

            所属シリーズ

        </label>

        <select
            id="characterSeries"
            class="text-input">

        </select>



        <label class="label">

            名前

        </label>

        <input
            id="characterName"
            class="text-input"
            type="text"
            placeholder="しろねこ">



        <label class="label">

            レアリティ

        </label>

        <select
            id="characterRarity"
            class="text-input">

            <option value="1">★☆☆☆☆</option>
            <option value="2">★★☆☆☆</option>
            <option value="3">★★★☆☆</option>
            <option value="4">★★★★☆</option>
            <option value="5">★★★★★</option>

        </select>



        <label class="label">

            キャラクター画像

        </label>

        <input
            id="characterImage"
            type="file"
            accept="image/*">

        <img
            id="imagePreview"
            class="preview-image">



        <label class="label">

            アイコン画像

        </label>

        <input
            id="characterIcon"
            type="file"
            accept="image/*">

        <img
            id="iconPreview"
            class="preview-image">



        <label class="label">

            ガチャ演出セリフ

        </label>

        <input
            id="characterQuote"
            class="text-input"
            type="text"
            placeholder="よろしくね！">



        <label class="label">

            説明

        </label>

        <textarea
            id="characterDescription"
            class="text-area"
            rows="5"
            placeholder="キャラクター説明を書いてください。"></textarea>



        <button
            id="saveCharacter"
            class="primary-button full">

            キャラクターを保存

        </button>

    </div>

</section>


        <!--==========================
            Settings
        ===========================-->

        <section id="settings"
                 class="page">

            <div class="panel">

                <h2>設定</h2>

                <p>

                    データの保存・読み込み

                </p>

            </div>

        </section>

    </main>

</div>

<script type="module" src="script.js"></script>

</body>

</html>
