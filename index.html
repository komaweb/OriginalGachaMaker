<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Original Gacha Maker</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

<header class="header">
    <h1>Original Gacha Maker</h1>
</header>

<nav class="tab-bar">

<button class="tab-button active" data-page="home">
ホーム
</button>

<button class="tab-button" data-page="gacha">
ガチャ
</button>

<button class="tab-button" data-page="collection">
図鑑
</button>

<button class="tab-button" data-page="editor">
編集
</button>

<button class="tab-button" data-page="settings">
設定
</button>

</nav>

<main>

<section id="home" class="page active">

<div class="card">

<h2>ホーム</h2>

<p>ようこそ！</p>

<p>ここからガチャを引いたり図鑑を見たりできます。</p>

</div>

</section>

<section id="gacha" class="page">

<div class="card">

<h2>ガチャ</h2>

<p>ガチャ画面はここ！</p>

</div>

</section>

<section id="collection" class="page">

<div class="card">

<h2>図鑑</h2>

<p>キャラクター一覧を表示します。</p>

</div>

</section>

<section id="editor" class="page">

<div class="card">

<h2>編集</h2>

<p>キャラクターやガチャを追加します。</p>

</div>

</section>

<section id="settings" class="page">

<div class="card">

<h2>設定</h2>

<p>データの保存・読み込みなど。</p>

</div>

</section>

</main>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
