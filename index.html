<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Original Gacha Maker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <!--==============================
        Header
    ==============================-->

    <header class="header">

        <h1>Original Gacha Maker</h1>

    </header>


    <!--==============================
        Tab
    ==============================-->

    <nav class="tab-bar">

        <button class="tab-button active"
                data-page="home">

            ホーム

        </button>

        <button class="tab-button"
                data-page="gacha">

            ガチャ

        </button>

        <button class="tab-button"
                data-page="collection">

            図鑑

        </button>

        <button class="tab-button"
                data-page="editor">

            編集

        </button>

        <button class="tab-button"
                data-page="settings">

            設定

        </button>

    </nav>



    <!--==============================
        Main
    ==============================-->

    <main>

        <!--==========================
            Home
        ===========================-->

        <section id="home"
                 class="page active">

            <div class="panel hero">

                <h2>Original Gacha Maker</h2>

                <p>
                    オリジナルキャラクターで遊べる
                    ガチャメーカー
                </p>

            </div>


            <div class="panel">

                <h3>開催中のガチャ</h3>

                <div class="banner">

                    ガチャバナー

                </div>

                <div class="button-group">

                    <button class="primary-button">

                        1連ガチャ

                    </button>

                    <button class="gacha-button">

    <img
        src="assets/ui/button-cat.png"
        class="button-frame"
        alt="">

    <span>

        10連ガチャ

    </span>

</button>
                </div>

            </div>

        </section>



        <!--==========================
            Gacha
        ===========================-->

        <section id="gacha"
                 class="page">

            <div class="panel">

                <h2>ガチャ</h2>

                <div class="banner">

                    ガチャ演出エリア

                </div>

                <div class="button-group">

                    <button class="primary-button">

                        1連

                    </button>

                    <button class="primary-button">

                        10連

                    </button>

                </div>

            </div>

        </section>



        <!--==========================
            Collection
        ===========================-->

        <section id="collection"
                 class="page">

            <div class="panel">

                <h2>図鑑</h2>

                <p>

                    キャラクター一覧

                </p>

            </div>

        </section>



        <!--==========================
            Editor
        ===========================-->

        <section id="editor"
                 class="page">

            <div class="panel">

                <h2>編集</h2>

                <p>

                    キャラクター追加・編集

                </p>

            </div>

        </section>



        <!--==========================
            Settings
        ===========================-->

        <section id="settings"
                 class="page">

            <div class="panel">

                <h2>設定</h2>

                <p>

                    データの保存・読み込み

                </p>

            </div>

        </section>

    </main>

</div>

<script type="module" src="script.js"></script>

</body>

</html>
